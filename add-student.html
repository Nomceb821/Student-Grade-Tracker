<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">

        <div class="login-card">

            <h1>Add Student</h1>

            <form id="studentForm">

                <input
                    type="text"
                    id="firstName"
                    placeholder="First Name"
                    required
                >

                <input
                    type="text"
                    id="lastName"
                    placeholder="Last Name"
                    required
                >

                <input
                    type="text"
                    id="grade"
                    placeholder="Grade"
                    required
                >

                <input
                    type="email"
                    id="studentEmail"
                    placeholder="Student Email"
                >

                <button type="submit">
                    Save Student
                </button>

            </form>

            <p id="message"></p>

            <a href="students.html" class="back-link">
                ← Back to Students
            </a>

        </div>

    </div>

    <script src="js/supabase.js"></script>
    <script src="js/add-student.js"></script>

</body>
</html>
